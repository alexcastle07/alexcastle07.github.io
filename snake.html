<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Volleyball Snake - Alex Castillo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1a3a5c;
      font-family: Arial, sans-serif;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 2em;
      margin: 20px 0 4px;
      color: #f0c040;
    }

    p.subtitle {
      font-size: 0.95em;
      color: #cce0ff;
      margin-bottom: 16px;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1em;
    }

    #scoreboard div {
      text-align: center;
    }

    #scoreboard span {
      display: block;
      font-size: 1.6em;
      font-weight: bold;
      color: #f0c040;
    }

    #game-wrapper {
      position: relative;
    }

    canvas {
      background-color: #eef3f9;
      border: 4px solid #f0c040;
      border-radius: 6px;
      display: block;
    }

    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(26, 58, 92, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    #overlay h2 {
      font-size: 1.8em;
      color: #f0c040;
      margin-bottom: 10px;
    }

    #overlay p {
      color: #cce0ff;
      margin-bottom: 20px;
      font-size: 0.95em;
      text-align: center;
      padding: 0 20px;
    }

    #overlay button {
      background-color: #f0c040;
      color: #1a3a5c;
      border: none;
      padding: 12px 32px;
      font-size: 1em;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    #overlay button:hover {
      background-color: #ffd84d;
    }

    #controls {
      margin-top: 16px;
      font-size: 0.85em;
      color: #cce0ff;
      text-align: center;
      line-height: 1.8;
    }

    .d-pad {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 4px;
      margin: 16px auto 0;
    }

    .d-pad button {
      background: #f0c040;
      color: #1a3a5c;
      border: none;
      border-radius: 6px;
      font-size: 1.2em;
      font-weight: bold;
      cursor: pointer;
      width: 48px;
      height: 48px;
    }

    .d-pad button:hover { background: #ffd84d; }
    .d-pad .empty { background: transparent; cursor: default; }

    #nav-links {
      margin-top: 24px;
      font-size: 0.85em;
    }

    #nav-links a {
      color: #f0c040;
      text-decoration: none;
      margin: 0 12px;
    }

    #nav-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <h1>🏐 Volleyball Snake</h1>
  <p class="subtitle">Eat the trophies, don't hit the walls!</p>

  <div id="scoreboard">
    <div>Score <span id="score">0</span></div>
    <div>Best <span id="best">0</span></div>
    <div>Level <span id="level">1</span></div>
  </div>

  <div id="game-wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="overlay">
      <h2 id="overlay-title">Volleyball Snake</h2>
      <p id="overlay-msg">Use arrow keys or the buttons below to move.<br>Eat trophies to grow and score points!</p>
      <button id="startBtn" onclick="startGame()">Start Game</button>
    </div>
  </div>

  <div id="controls">
    Arrow keys to move &nbsp;·&nbsp; Game speeds up as you score
  </div>

  <!-- D-pad for mobile -->
  <div class="d-pad">
    <div class="empty"></div>
    <button onclick="changeDir(0,-1)">▲</button>
    <div class="empty"></div>
    <button onclick="changeDir(-1,0)">◀</button>
    <div class="empty"></div>
    <button onclick="changeDir(1,0)">▶</button>
    <div class="empty"></div>
    <button onclick="changeDir(0,1)">▼</button>
    <div class="empty"></div>
  </div>

  <div id="nav-links">
    <a href="index.html">← Back to Home</a>
    <a href="volleyball.html">Volleyball Page</a>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, food, score, best, level, speed, gameLoop, running;

    best = 0;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 }
      ];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      level   = 1;
      speed   = 150;
      placeFood();
      updateScoreboard();
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function startGame() {
      document.getElementById('overlay').style.display = 'none';
      initGame();
      running = true;
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, speed);
    }

    function tick() {
      dir = { ...nextDir };

      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return endGame();
      }

      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      // Ate food
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        if (score > best) best = score;
        if (score % 50 === 0) {
          level++;
          speed = Math.max(60, speed - 15);
          clearInterval(gameLoop);
          gameLoop = setInterval(tick, speed);
        }
        placeFood();
        updateScoreboard();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid lines (subtle)
      ctx.strokeStyle = '#dce3ea';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= canvas.width; x += GRID) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += GRID) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }

      // Snake body
      snake.forEach((seg, i) => {
        const cx = seg.x * GRID + GRID / 2;
        const cy = seg.y * GRID + GRID / 2;
        const r  = GRID / 2 - 1;

        if (i === 0) {
          // Head — volleyball
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fillStyle = '#f5f0e8';
          ctx.fill();
          ctx.strokeStyle = '#1a3a5c';
          ctx.lineWidth = 1.5;
          ctx.stroke();

          // Volleyball lines
          ctx.strokeStyle = '#1a3a5c';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(cx, cy, r, -0.5, Math.PI + 0.5);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(cx, cy, r, Math.PI - 0.5, Math.PI * 2 + 0.5);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(cx, cy - r);
          ctx.lineTo(cx, cy + r);
          ctx.stroke();

        } else {
          // Body segments
          const alpha = 1 - (i / snake.length) * 0.5;
          ctx.beginPath();
          ctx.arc(cx, cy, r - 1, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(26, 58, 92, ${alpha})`;
          ctx.fill();
        }
      });

      // Food — trophy star
      const fx = food.x * GRID + GRID / 2;
      const fy = food.y * GRID + GRID / 2;
      ctx.font = `${GRID - 2}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🏆', fx, fy);
    }

    function endGame() {
      clearInterval(gameLoop);
      running = false;
      if (score > best) best = score;
      updateScoreboard();

      document.getElementById('overlay-title').textContent = 'Game Over!';
      document.getElementById('overlay-msg').textContent =
        `You scored ${score} points. Best: ${best}`;
      document.getElementById('startBtn').textContent = 'Play Again';
      document.getElementById('overlay').style.display = 'flex';
    }

    function updateScoreboard() {
      document.getElementById('score').textContent = score;
      document.getElementById('best').textContent  = best;
      document.getElementById('level').textContent = level;
    }

    function changeDir(dx, dy) {
      // Prevent reversing
      if (dx === -dir.x && dy === -dir.y) return;
      nextDir = { x: dx, y: dy };
    }

    document.addEventListener('keydown', e => {
      if      (e.key === 'ArrowUp')    changeDir(0, -1);
      else if (e.key === 'ArrowDown')  changeDir(0,  1);
      else if (e.key === 'ArrowLeft')  changeDir(-1, 0);
      else if (e.key === 'ArrowRight') changeDir(1,  0);
    });

    // Draw initial empty board
    draw();
  </script>

</body>
</html>
